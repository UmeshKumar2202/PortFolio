<section class="section" id="contact" aria-labelledby="contact-heading">
  <div class="container">
    <div class="contact reveal">
      <div class="contact__content">
        <span class="section__eyebrow">Contact</span>
        <h2 class="section__title" id="contact-heading">Let's build something impactful</h2>
        <p class="contact__text">
          Open to senior AI, data engineering, and ML platform roles.
          Reach out for collaborations, consulting, or just to connect.
        </p>
      </div>

      <div class="contact__actions">
        <a class="btn btn--primary btn--lg" href="{{ site.social.email }}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
          Email Me
        </a>
        <a class="btn btn--ghost btn--lg" href="{{ site.social.linkedin }}" target="_blank" rel="noopener">
          LinkedIn
        </a>
        <a class="btn btn--ghost btn--lg" href="{{ site.social.github }}" target="_blank" rel="noopener">
          GitHub
        </a>
      </div>

      <address class="contact__info glass">
        <span>{{ site.email }}</span>
        <span aria-hidden="true">·</span>
        <span>{{ site.location }}</span>
      </address>
    </div>
  </div>
</section>
